name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore
        run: dotnet restore -f net9.0-android

      - name: Build APK
        run: dotnet publish -f net9.0-android -c Release -p:AndroidSdkDirectory=$ANDROID_SDK_ROOT -p:AndroidKeyStore=false

      - name: Find APK
        run: find . -name "*.apk" | head -20

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Calculator-Android
          path: |
            **/*.apk
            **/*-Signed.apk
          if-no-files-found: warn
